# ── Database ──────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA ───────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ── Server ────────────────────────────────────────────────────
server.port=${PORT:9090}

# ── JWT ───────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:freelancerhub_super_secret_local_key_2024_secure}
jwt.expiration=86400000
