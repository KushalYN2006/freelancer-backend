# ── Database (Railway MySQL) ──────────────────────────────────
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# MySQL8Dialect was removed in Hibernate 7 — use this instead
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ── Server ────────────────────────────────────────────────────
server.port=${PORT:8080}

# ── JWT ───────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:freelancerhub_local_secret}
jwt.expiration=86400000